<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, '500', 'Error', 'Error interno')}">

<div th:fragment="content">
  <div class="card soft-card p-4">
    <h4 class="mb-2">Error interno del servidor</h4>
    <div class="text-muted">Ocurrió un problema inesperado. Intenta nuevamente o vuelve al inicio.</div>

    <div class="mt-3" th:if="${message != null and !#strings.isEmpty(message)}">
      <div class="small text-muted mb-1">Detalle</div>
      <div class="alert alert-danger mb-0" th:text="${message}">Detalle del error</div>
    </div>

    <div class="mt-3" th:if="${errorId != null}">
      <div class="small text-muted">ID de error: <b th:text="${errorId}">ERR-000000</b></div>
    </div>

    <div class="d-flex gap-2 mt-4 flex-wrap">
      <a class="btn btn-primary" th:href="@{/}">Volver al inicio</a>
      <button type="button" class="btn btn-outline-dark" onclick="location.reload()">Reintentar</button>
    </div>
  </div>
</div>

</html>
