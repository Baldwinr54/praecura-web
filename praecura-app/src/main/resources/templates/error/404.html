<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, '404', 'Error', 'Página no encontrada')}">

<div th:fragment="content">
  <div class="card soft-card p-4">
    <h4 class="mb-2">Página no encontrada</h4>
    <div class="text-muted">La URL solicitada no existe o fue movida.</div>

    <div class="mt-3 small text-muted" th:if="${path != null}">
      Ruta: <b th:text="${path}">/ruta</b>
    </div>

    <div class="d-flex gap-2 mt-4 flex-wrap">
      <a class="btn btn-primary" th:href="@{/}">Volver al inicio</a>
      <a class="btn btn-outline-dark" th:href="@{/agenda}">Ir a Agenda</a>
    </div>
  </div>
</div>

</html>
