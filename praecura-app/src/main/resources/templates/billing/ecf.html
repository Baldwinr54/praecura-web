<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'e-CF DGII', 'Finanzas', 'Seguimiento de comprobantes electrónicos')}">

<div th:fragment="content">
  <div class="card soft-card p-4 mb-3">
    <form class="row g-2 align-items-end" th:action="@{/billing/fiscal/ecf}" method="get">
      <div class="col-md-3">
        <label class="form-label">Estado e-CF</label>
        <select class="form-select" name="status">
          <option value="" th:selected="${status == null}">Todos</option>
          <option th:each="st : ${statuses}" th:value="${st.name()}" th:selected="${status == st}" th:text="${st.label()}">Pendiente</option>
        </select>
      </div>
      <div class="col-md-2">
        <input type="hidden" name="size" th:value="${size}">
        <button class="btn btn-outline-secondary" type="submit">Filtrar</button>
      </div>
      <div class="col-md-7 text-md-end">
        <form class="d-inline-block me-2" th:if="${isBillingSupervisor}" th:action="@{/billing/fiscal/ecf/process}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="status" th:if="${status != null}" th:value="${status.name()}">
          <input type="hidden" name="page" th:value="${docsPage.number}">
          <input type="hidden" name="size" th:value="${size}">
          <input type="hidden" name="limit" value="30">
          <button class="btn btn-sm btn-primary" type="submit" th:disabled="${!dgiiEnabled}">Procesar cola e-CF</button>
        </form>
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/billing/fiscal}">Secuencias NCF</a>
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/billing}">Facturación</a>
      </div>
    </form>
    <div class="small mt-2" th:classappend="${dgiiEnabled} ? 'text-success' : 'text-warning'">
      <span th:text="${dgiiEnabled} ? 'Integración DGII habilitada.' : 'Integración DGII desactivada; la cola no se procesa automáticamente.'">Integración DGII</span>
    </div>
  </div>

  <div class="card soft-card p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
          <th style="width:100px">Factura</th>
          <th style="width:180px">Creado</th>
          <th style="width:150px">e-NCF</th>
          <th style="width:170px">Estado</th>
          <th style="width:180px">TrackId DGII</th>
          <th style="width:150px">Reintento</th>
          <th>Código/Detalle DGII</th>
          <th style="width:250px" class="text-end">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${docsPage.content}">
          <td>
            <a class="link-primary" th:href="@{/billing/invoices/{id}(id=${d.invoice.id})}" th:text="${'#' + d.invoice.id}">#1</a>
          </td>
          <td th:text="${d.createdAt != null ? #temporals.format(d.createdAt, 'yyyy-MM-dd HH:mm') : '—'}">2026-01-01</td>
          <td th:text="${d.eNcf != null ? d.eNcf : 'Pendiente'}">E31...</td>
          <td>
            <span class="badge text-bg-light" th:text="${d.status != null ? d.status.label() : '—'}">Pendiente</span>
          </td>
          <td th:text="${d.dgiiTrackId != null ? d.dgiiTrackId : '—'}">TRK</td>
          <td>
            <div th:text="${d.nextRetryAt != null ? #temporals.format(d.nextRetryAt, 'yyyy-MM-dd HH:mm') : '—'}">2026-01-01 10:00</div>
            <div class="small text-muted" th:text="|Intentos: ${d.attemptCount}|">Intentos: 0</div>
          </td>
          <td>
            <div th:text="${d.dgiiStatusCode != null ? d.dgiiStatusCode : '—'}">code</div>
            <div class="small text-muted" th:text="${d.dgiiMessage != null ? d.dgiiMessage : '—'}">message</div>
          </td>
          <td class="text-end">
            <div class="d-flex justify-content-end gap-1 flex-wrap">
              <a class="btn btn-sm btn-outline-primary" th:href="@{/billing/invoices/{id}(id=${d.invoice.id})}">Ver factura</a>
              <form th:if="${isBillingSupervisor and dgiiEnabled and d.status != T(com.baldwin.praecura.entity.EcfStatus).ACCEPTED and d.status != T(com.baldwin.praecura.entity.EcfStatus).ACCEPTED_WITH_OBSERVATION and d.status != T(com.baldwin.praecura.entity.EcfStatus).VOIDED}"
                    th:action="@{/billing/invoices/{id}/ecf/send(id=${d.invoice.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-primary" type="submit">Enviar</button>
              </form>
              <form th:if="${isBillingSupervisor and dgiiEnabled and d.dgiiTrackId != null}"
                    th:action="@{/billing/invoices/{id}/ecf/sync(id=${d.invoice.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-secondary" type="submit">Consultar</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${docsPage.totalElements == 0}">
          <td colspan="8" class="text-center text-muted py-3">No hay registros e-CF aún.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div class="text-muted small">Mostrando <span th:text="${docsPage.numberOfElements}"></span> de <span th:text="${docsPage.totalElements}"></span></div>
      <nav th:if="${docsPage.totalPages > 1}">
        <ul class="pagination pagination-sm mb-0">
          <li class="page-item" th:classappend="${docsPage.first} ? 'disabled' : ''">
            <a class="page-link" th:href="@{/billing/fiscal/ecf(status=${status}, page=${docsPage.number-1}, size=${size})}">Anterior</a>
          </li>
          <li class="page-item" th:each="p : ${#numbers.sequence(0, docsPage.totalPages-1)}"
              th:classappend="${p == docsPage.number} ? 'active' : ''">
            <a class="page-link" th:href="@{/billing/fiscal/ecf(status=${status}, page=${p}, size=${size})}" th:text="${p+1}">1</a>
          </li>
          <li class="page-item" th:classappend="${docsPage.last} ? 'disabled' : ''">
            <a class="page-link" th:href="@{/billing/fiscal/ecf(status=${status}, page=${docsPage.number+1}, size=${size})}">Siguiente</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>

</html>
