<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Panel de Dueño', 'Administración propietaria', 'Marca, empresa y factura por cliente')}">

<div th:fragment="content">
  <div class="card soft-card p-4 mb-3">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h5 class="mb-1">Configuración de marca y empresa</h5>
        <div class="text-muted small">
          Estos cambios afectan nombre del sistema, encabezados y factura impresa.
        </div>
      </div>
      <span class="badge text-bg-warning">Solo Dueño</span>
    </div>
  </div>

  <form th:action="@{/owner/branding}" th:object="${form}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="card soft-card p-4 mb-3">
      <h6 class="text-muted mb-3">Identidad del sistema</h6>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre visible del sistema</label>
          <input class="form-control" th:field="*{appDisplayName}" placeholder="Ej: Centro Médico Acme" maxlength="80" required>
          <div class="text-danger small" th:if="${#fields.hasErrors('appDisplayName')}" th:errors="*{appDisplayName}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Subtítulo del sistema</label>
          <input class="form-control" th:field="*{appTagline}" placeholder="Ej: Gestión Clínica Integral" maxlength="120">
          <div class="text-danger small" th:if="${#fields.hasErrors('appTagline')}" th:errors="*{appTagline}"></div>
        </div>
      </div>
    </div>

    <div class="card soft-card p-4 mb-3">
      <h6 class="text-muted mb-3">Datos fiscales de la empresa</h6>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Razón social / Empresa</label>
          <input class="form-control" th:field="*{companyName}" placeholder="Ej: Clínica Acme, SRL" maxlength="160" required>
          <div class="text-danger small" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nombre comercial</label>
          <input class="form-control" th:field="*{companyTradeName}" placeholder="Ej: Clínica Acme" maxlength="160">
          <div class="text-danger small" th:if="${#fields.hasErrors('companyTradeName')}" th:errors="*{companyTradeName}"></div>
        </div>
        <div class="col-md-4">
          <label class="form-label">RNC / Cédula</label>
          <input class="form-control" th:field="*{companyRnc}" placeholder="Ej: 130123456" maxlength="13" inputmode="numeric" data-mask="rd-tax-id">
          <div class="text-danger small" th:if="${#fields.hasErrors('companyRnc')}" th:errors="*{companyRnc}"></div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Teléfono</label>
          <input class="form-control" th:field="*{companyPhone}" placeholder="Ej: 809-555-0100" maxlength="12" inputmode="numeric" data-mask="rd-phone">
          <div class="text-danger small" th:if="${#fields.hasErrors('companyPhone')}" th:errors="*{companyPhone}"></div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Correo</label>
          <input class="form-control" th:field="*{companyEmail}" placeholder="facturacion@empresa.do" maxlength="160">
          <div class="text-danger small" th:if="${#fields.hasErrors('companyEmail')}" th:errors="*{companyEmail}"></div>
        </div>
        <div class="col-12">
          <label class="form-label">Dirección fiscal</label>
          <input class="form-control" th:field="*{companyAddress}" placeholder="Dirección completa para factura" maxlength="200">
          <div class="text-danger small" th:if="${#fields.hasErrors('companyAddress')}" th:errors="*{companyAddress}"></div>
        </div>
      </div>
    </div>

    <div class="card soft-card p-4 mb-3">
      <h6 class="text-muted mb-3">Factura impresa (ticket)</h6>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Leyenda final</label>
          <input class="form-control" th:field="*{invoiceFooter}" placeholder="Ej: Gracias por su preferencia" maxlength="240">
          <div class="form-text">
            Esta leyenda aparece al final del ticket de factura.
          </div>
          <div class="text-danger small" th:if="${#fields.hasErrors('invoiceFooter')}" th:errors="*{invoiceFooter}"></div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-primary" type="submit">Guardar configuración</button>
      <a class="btn btn-outline-secondary" th:href="@{/}">Volver</a>
    </div>
  </form>
</div>

</html>
