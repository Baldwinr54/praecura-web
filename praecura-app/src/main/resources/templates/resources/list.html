<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{fragments/layout :: layout(~{::content}, 'Recursos', 'Recursos', 'Recursos clínicos')}">
  <div th:fragment="content">

    <div class="page-actions">
      <form class="search-row" th:action="@{/resources}" method="get" role="search">
        <input class="form-control search-input" type="text" name="q" placeholder="Buscar (nombre...)" th:value="${q}">

        <select class="form-select" name="siteId" style="max-width: 220px">
          <option value="" th:selected="${siteId == null}">Todas las sedes</option>
          <option th:each="s : ${sites}" th:value="${s.id}" th:text="${s.name}" th:selected="${siteId != null and siteId == s.id}"></option>
        </select>

        <input type="hidden" name="size" th:value="${size}">
        <button class="btn btn-outline-secondary" type="submit">Buscar</button>
        <a class="btn btn-ghost" th:href="@{/resources}">Limpiar</a>
      </form>

      <a class="btn btn-primary" th:href="@{/resources/new}">Nuevo recurso</a>
    </div>

    <div th:if="${resourcesPage.totalElements == 0}" class="empty-state">
      <div class="empty-state__box">
        <div class="empty-state__title">No hay recursos registrados</div>
        <div class="empty-state__text">Crea consultorios, salas y equipos para la agenda.</div>
        <a class="btn btn-primary" th:href="@{/resources/new}">Crear primer recurso</a>
      </div>
    </div>

    <div th:if="${resourcesPage.totalElements > 0}" class="card soft-card p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
          <tr>
            <th style="width:80px">ID</th>
            <th>Nombre</th>
            <th style="width:200px">Tipo</th>
            <th>Sede</th>
            <th style="width:220px" class="text-end">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="r : ${resourcesPage.content}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.name}"></td>
            <td th:text="${r.type != null ? r.type.label() : '—'}"></td>
            <td th:text="${r.site != null ? r.site.name : '—'}"></td>
            <td>
              <div class="d-flex justify-content-end gap-2 flex-wrap">
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/resources/{id}/edit(id=${r.id})}">Editar</a>
                <form th:action="@{/resources/{id}/deactivate(id=${r.id})}" method="post" style="display:inline" data-confirm="¿Desactivar este recurso?">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="q" th:value="${q}">
                  <input type="hidden" name="siteId" th:value="${siteId}">
                  <input type="hidden" name="page" th:value="${resourcesPage.number}">
                  <input type="hidden" name="size" th:value="${size}">
                  <button class="btn btn-sm btn-danger" type="submit">Desactivar</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="text-muted small">Mostrando <span th:text="${resourcesPage.numberOfElements}"></span> de <span th:text="${resourcesPage.totalElements}"></span></div>
        <nav th:if="${resourcesPage.totalPages > 1}">
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${resourcesPage.first} ? 'disabled' : ''">
              <a class="page-link" th:href="@{/resources(q=${q}, siteId=${siteId}, page=${resourcesPage.number-1}, size=${size})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, resourcesPage.totalPages-1)}" th:classappend="${i == resourcesPage.number} ? 'active' : ''">
              <a class="page-link" th:href="@{/resources(q=${q}, siteId=${siteId}, page=${i}, size=${size})}" th:text="${i+1}">1</a>
            </li>
            <li class="page-item" th:classappend="${resourcesPage.last} ? 'disabled' : ''">
              <a class="page-link" th:href="@{/resources(q=${q}, siteId=${siteId}, page=${resourcesPage.number+1}, size=${size})}">Siguiente</a>
            </li>
          </ul>
        </nav>
      </div>

    </div>

  </div>
</div>
</body>
</html>
