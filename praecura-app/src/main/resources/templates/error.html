<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Error', 'Error', 'Ha ocurrido un problema')}">

<div th:fragment="content">
  <div class="card soft-card p-4">
    <h4 class="mb-2">Ocurrió un error</h4>

    <div class="text-muted">
      <div th:if="${status != null}"><b>Código:</b> <span th:text="${status}">500</span></div>
      <div th:if="${error != null}"><b>Tipo:</b> <span th:text="${error}">Internal Server Error</span></div>
      <div th:if="${path != null}"><b>Ruta:</b> <span th:text="${path}">/</span></div>
    </div>

    <div class="mt-3" th:if="${message != null and !#strings.isEmpty(message)}">
      <div class="small text-muted mb-1">Detalle</div>
      <div class="alert alert-danger mb-0" th:text="${message}">Detalle del error</div>
    </div>

    <!-- Developer details: enabled via praecura.ui.show-error-details=true -->
    <div class="mt-3" th:if="${@environment.getProperty('praecura.ui.show-error-details','false') == 'true'}">
      <details class="soft-card p-3" style="border: 1px solid rgba(0,0,0,0.08);" th:open="${param.trace != null}">
        <summary class="fw-semibold">Detalles técnicos</summary>

        <div class="mt-3 small">
          <div th:if="${exception != null}"><b>exception class:</b> <code th:text="${exception}">java.lang.Exception</code></div>
          <div th:if="${message != null and !#strings.isEmpty(message)}" class="mt-2">
            <div class="text-muted mb-1">message</div>
            <pre class="mb-0" style="white-space: pre-wrap;" th:text="${message}">Mensaje</pre>
          </div>

          <details class="mt-3" th:if="${trace != null and !#strings.isEmpty(trace)}" th:open="${param.trace != null}">
            <summary class="fw-semibold">Stacktrace</summary>
            <pre class="mt-2" style="white-space: pre; overflow:auto; max-height: 320px;" th:text="${trace}">stack</pre>
          </details>

          <div class="text-muted mt-2" th:if="${trace == null or #strings.isEmpty(trace)}">
            Para ver el stacktrace, agrega <code>?trace=true</code> a la URL.
          </div>
        </div>
      </details>
    </div>

    <div class="d-flex gap-2 mt-4 flex-wrap">
      <a class="btn btn-primary" th:href="@{/}">Volver al inicio</a>
      <button type="button" class="btn btn-outline-dark" onclick="history.back()">Regresar</button>
    </div>
  </div>
</div>

</html>
