<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Paciente', 'Paciente', 'Registro de paciente')}">

<div th:fragment="content">
  <div class="card soft-card p-4">
	    <form th:object="${patientForm}"
	          th:action="${patientForm.id} == null ? @{/patients} : @{|/patients/${patientForm.id}|}"
          method="post">

	      <input type="hidden" th:field="*{id}"/>
	      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

	      <div class="row g-3 mb-3">
	        <div class="col-md-6">
	          <label class="form-label">Nombre</label>
	          <input class="form-control" th:field="*{firstName}" placeholder="Ej: Juan" autocomplete="given-name"/>
	          <div class="text-danger small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
	        </div>
	        <div class="col-md-6">
	          <label class="form-label">Apellidos</label>
	          <input class="form-control" th:field="*{lastName}" placeholder="Ej: Pérez" autocomplete="family-name"/>
	          <div class="text-danger small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
	        </div>
	      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Teléfono</label>
          <input class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                 th:field="*{phone}"
                 placeholder="Ej: 809-000-0000"
                 inputmode="numeric"
                 autocomplete="tel"
                 maxlength="12"
                 data-mask="rd-phone"/>
          <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Cédula</label>
          <input class="form-control" th:classappend="${#fields.hasErrors('cedula')} ? 'is-invalid' : ''"
                 th:field="*{cedula}"
                 placeholder="Ej: 000-0000000-0"
                 inputmode="numeric"
                 autocomplete="off"
                 maxlength="13"
                 data-mask="rd-cedula"/>
          <div class="text-danger small" th:if="${#fields.hasErrors('cedula')}" th:errors="*{cedula}"></div>
        </div>
      </div>


      <div class="row g-3 mt-0">
        <div class="col-md-6">
          <label class="form-label">Correo electrónico</label>
          <input class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                 th:field="*{email}"
                 placeholder="Ej: nombre@correo.com"
                 autocomplete="email"/>
          <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
          <div class="form-text">Se requiere teléfono o correo para poder crear citas.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Etiquetas</label>
          <input class="form-control" th:classappend="${#fields.hasErrors('flags')} ? 'is-invalid' : ''"
                 th:field="*{flags}"
                 placeholder="Ej: VIP, Primera vez, Crónico"/>
          <div class="form-text">Separadas por coma. Útil para alertas rápidas.</div>
          <div class="text-danger small" th:if="${#fields.hasErrors('flags')}" th:errors="*{flags}"></div>
        </div>
      </div>

      <div class="card soft-card p-3 mt-3">
        <div class="fw-semibold mb-2">Consentimientos de contacto</div>
        <div class="row g-2 align-items-center">
          <div class="col-md-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" th:field="*{consentSms}" id="consentSms">
              <label class="form-check-label" for="consentSms">SMS</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" th:field="*{consentEmail}" id="consentEmail">
              <label class="form-check-label" for="consentEmail">Email</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" th:field="*{consentWhatsapp}" id="consentWhatsapp">
              <label class="form-check-label" for="consentWhatsapp">WhatsApp</label>
            </div>
          </div>
        </div>
        <div class="row g-2 mt-2">
          <div class="col-md-6">
            <label class="form-label small text-muted">Canal preferido</label>
            <select class="form-select" th:field="*{preferredChannel}">
              <option value="">Automático</option>
              <option th:each="c : ${T(com.baldwin.praecura.entity.MessageChannel).values()}"
                      th:value="${c}" th:text="${c}">SMS</option>
            </select>
          </div>
          <div class="col-md-6">
            <div class="form-text">Solo se enviarán recordatorios con consentimiento.</div>
          </div>
        </div>
      </div>

      <div class="card soft-card p-3 mt-3">
        <div class="fw-semibold mb-2">Datos fiscales (facturación)</div>
        <div class="row g-3">
          <div class="col-md-5">
            <label class="form-label">Nombre fiscal</label>
            <input class="form-control" th:field="*{billingName}" placeholder="Ej: Clínica Santo Domingo SRL"/>
            <div class="form-text">Si está vacío, se usará el nombre del paciente.</div>
          </div>
          <div class="col-md-3">
            <label class="form-label">RNC / Cédula</label>
            <input class="form-control" th:classappend="${#fields.hasErrors('billingTaxId')} ? 'is-invalid' : ''"
                   th:field="*{billingTaxId}" placeholder="Ej: 101-12345-6" inputmode="numeric" maxlength="13" data-mask="rd-tax-id"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('billingTaxId')}" th:errors="*{billingTaxId}"></div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Dirección fiscal</label>
            <input class="form-control" th:field="*{billingAddress}" placeholder="Ej: Av. Winston Churchill 123"/>
          </div>
        </div>
      </div>

      <div class="row g-3 mt-0">
        <div class="col-12">
          <label class="form-label">Notas</label>
          <textarea class="form-control" th:classappend="${#fields.hasErrors('notes')} ? 'is-invalid' : ''"
                    th:field="*{notes}"
                    rows="4"
                    placeholder="Notas clínicas u operativas (alergias, indicaciones, etc.)"></textarea>
          <div class="text-danger small" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary">Guardar</button>
        <a class="btn btn-outline-dark" th:href="@{/patients}">Volver</a>
      </div>
    </form>
  </div>
</div>

</html>
