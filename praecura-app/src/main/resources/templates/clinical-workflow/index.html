<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Clínico avanzado', 'Clínico', 'SOAP, diagnósticos codificados y órdenes clínicas')}">

<div th:fragment="content">
  <div class="card soft-card p-3 mb-3">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
      <h6 class="mb-0">Nuevo encuentro SOAP</h6>
      <a class="btn btn-sm btn-outline-secondary" th:href="@{/patients}">Pacientes</a>
    </div>
    <form class="row g-2" th:action="@{/clinical-workflow/encounters}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="col-md-3">
        <select class="form-select" name="patientId" required>
          <option value="">Paciente</option>
          <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName}">Paciente</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" name="appointmentId">
          <option value="">Cita (opcional)</option>
          <option th:each="a : ${appointments}" th:value="${a.id}" th:text="${'#' + a.id + ' - ' + a.patient.fullName}">Cita</option>
        </select>
      </div>
      <div class="col-md-6"><input class="form-control" name="chiefComplaint" placeholder="Motivo de consulta"></div>
      <div class="col-md-6"><textarea class="form-control" name="subjective" rows="2" placeholder="S - Subjetivo"></textarea></div>
      <div class="col-md-6"><textarea class="form-control" name="objective" rows="2" placeholder="O - Objetivo"></textarea></div>
      <div class="col-md-6"><textarea class="form-control" name="assessment" rows="2" placeholder="A - Assessment"></textarea></div>
      <div class="col-md-6"><textarea class="form-control" name="plan" rows="2" placeholder="P - Plan"></textarea></div>
      <div class="col-12"><button class="btn btn-primary" type="submit">Crear encuentro</button></div>
    </form>
  </div>

  <div class="row g-3">
    <div class="col-12 col-lg-5">
      <div class="card soft-card p-3 h-100">
        <h6>Encuentros clínicos</h6>
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead><tr><th>Fecha</th><th>Paciente</th><th>Estado</th><th></th></tr></thead>
            <tbody>
            <tr th:each="e : ${encounters}">
              <td th:text="${#temporals.format(e.encounterAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
              <td th:text="${e.patient.fullName}">Paciente</td>
              <td><span class="badge text-bg-light" th:text="${e.status.label()}">Estado</span></td>
              <td><a class="btn btn-sm btn-outline-primary" th:href="@{/clinical-workflow(encounterId=${e.id})}">Abrir</a></td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-7">
      <div class="card soft-card p-3 h-100" th:if="${activeEncounterId != null}">
        <h6 class="mb-2">Encuentro activo #<span th:text="${activeEncounterId}">0</span></h6>

        <form class="row g-2 mb-3" th:action="@{/clinical-workflow/encounters/{id}/soap(id=${activeEncounterId})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-8"><input class="form-control" name="chiefComplaint" placeholder="Motivo actualizado"></div>
          <div class="col-md-4">
            <select class="form-select" name="status">
              <option th:each="s : ${encounterStatuses}" th:value="${s}" th:text="${s.label()}">Estado</option>
            </select>
          </div>
          <div class="col-md-6"><textarea class="form-control" rows="2" name="subjective" placeholder="S - Subjetivo"></textarea></div>
          <div class="col-md-6"><textarea class="form-control" rows="2" name="objective" placeholder="O - Objetivo"></textarea></div>
          <div class="col-md-6"><textarea class="form-control" rows="2" name="assessment" placeholder="A - Assessment"></textarea></div>
          <div class="col-md-6"><textarea class="form-control" rows="2" name="plan" placeholder="P - Plan"></textarea></div>
          <div class="col-12"><button class="btn btn-outline-primary" type="submit">Actualizar SOAP</button></div>
        </form>

        <div class="row g-3">
          <div class="col-12 col-xl-6">
            <h6 class="small text-muted">Diagnósticos codificados</h6>
            <form class="row g-2 mb-2" th:action="@{/clinical-workflow/encounters/{id}/diagnoses(id=${activeEncounterId})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div class="col-md-4"><input class="form-control" name="icd10Code" placeholder="ICD-10"></div>
              <div class="col-md-8"><input class="form-control" name="description" placeholder="Descripción" required></div>
              <div class="col-md-8"><input class="form-control" name="notes" placeholder="Notas"></div>
              <div class="col-md-4">
                <select class="form-select" name="primaryDiagnosis">
                  <option value="false">Secundario</option>
                  <option value="true">Principal</option>
                </select>
              </div>
              <div class="col-12"><button class="btn btn-sm btn-outline-secondary" type="submit">Agregar diagnóstico</button></div>
            </form>
            <ul class="list-group">
              <li class="list-group-item py-2" th:each="d : ${diagnoses}">
                <div class="fw-semibold" th:text="${d.description}">Descripción</div>
                <div class="small text-muted" th:text="${(d.icd10Code != null ? d.icd10Code : 'Sin código') + (d.primaryDiagnosis ? ' · Principal' : '')}">I10</div>
              </li>
            </ul>
          </div>

          <div class="col-12 col-xl-6">
            <h6 class="small text-muted">Órdenes clínicas</h6>
            <form class="row g-2 mb-2" th:action="@{/clinical-workflow/encounters/{id}/orders(id=${activeEncounterId})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div class="col-md-6">
                <select class="form-select" name="orderType" required>
                  <option th:each="t : ${orderTypes}" th:value="${t}" th:text="${t.label()}">Tipo</option>
                </select>
              </div>
              <div class="col-md-6">
                <select class="form-select" name="priority">
                  <option th:each="p : ${orderPriorities}" th:value="${p}" th:text="${p.label()}">Prioridad</option>
                </select>
              </div>
              <div class="col-12"><input class="form-control" name="orderName" placeholder="Orden" required></div>
              <div class="col-12"><input class="form-control" name="instructions" placeholder="Instrucciones"></div>
              <div class="col-md-6"><input class="form-control" type="datetime-local" name="dueAt"></div>
              <div class="col-md-6"><input class="form-control" type="number" step="0.01" name="costEstimate" placeholder="Costo estimado"></div>
              <div class="col-12"><button class="btn btn-sm btn-outline-secondary" type="submit">Agregar orden</button></div>
            </form>

            <div class="table-responsive">
              <table class="table table-sm mb-0">
                <thead><tr><th>Orden</th><th>Estado</th><th></th></tr></thead>
                <tbody>
                <tr th:each="o : ${orders}">
                  <td>
                    <div class="fw-semibold" th:text="${o.orderName}">Orden</div>
                    <div class="small text-muted" th:text="${o.orderType.label() + ' · ' + o.priority.label()}">Tipo</div>
                  </td>
                  <td><span class="badge text-bg-light" th:text="${o.status.label()}">Estado</span></td>
                  <td>
                    <form class="d-flex gap-1" th:action="@{/clinical-workflow/orders/{id}/status(id=${o.id})}" method="post">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <select class="form-select form-select-sm" name="status">
                        <option th:each="s : ${orderStatuses}" th:value="${s}" th:selected="${s == o.status}" th:text="${s.label()}">Estado</option>
                      </select>
                      <button class="btn btn-sm btn-outline-primary" type="submit">OK</button>
                    </form>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="card soft-card p-3" th:if="${activeEncounterId == null}">
        Selecciona o crea un encuentro para gestionar SOAP, diagnósticos y órdenes.
      </div>
    </div>
  </div>
</div>

</html>
