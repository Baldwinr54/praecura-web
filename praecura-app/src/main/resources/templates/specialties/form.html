<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{fragments/layout :: layout(~{::content}, ${isEdit} ? 'Editar Especialidad' : 'Nueva Especialidad', 'Especialidades', 'Especialidades clínicas')}">
  <div th:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h2 class="h4 mb-0" th:text="${isEdit} ? 'Editar Especialidad' : 'Nueva Especialidad'">Nueva Especialidad</h2>
        <div class="text-muted small">Nombre único (no distingue mayúsculas/minúsculas). Puede desactivar una especialidad si no desea mostrarla.</div>
      </div>
      <a class="btn btn-outline-secondary" th:href="@{/specialties}">
        <i class="bi bi-arrow-left me-1"></i> Volver
      </a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form th:action="@{/specialties}"
              method="post"
              th:object="${form}">

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" th:field="*{id}" />

          <div class="mb-3">
            <label class="form-label" for="name">Nombre</label>
            <input class="form-control" id="name" type="text" th:field="*{name}" placeholder="Ej.: Cardiología" maxlength="120" />
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</div>
          </div>

          <div class="form-check form-switch mb-3">
            <input class="form-check-input" id="active" type="checkbox" th:field="*{active}" />
            <label class="form-check-label" for="active">Activa</label>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-save2 me-1"></i> Guardar
            </button>
            <a class="btn btn-outline-secondary" th:href="@{/specialties}">Cancelar</a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

</body>
</html>
