<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Servicio', 'Servicio', 'Registro de servicio')}">

<div th:fragment="content">
  <div class="card soft-card p-4">
    <form th:object="${form}"
          th:action="${form.id} == null ? @{/services} : @{|/services/${form.id}|}"
          method="post">

      <input type="hidden" th:field="*{id}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input class="form-control" th:field="*{name}" placeholder="Ej: Consulta general">
          <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Duración</label>
          <input class="form-control" type="text" inputmode="numeric"
                 th:field="*{durationMinutes}" placeholder="Ej: 45, 59:59, 120">
          <div class="form-text">Introduce minutos. También se acepta formato tipo <span class="text-muted">59:59</span> o <span class="text-muted">59.59</span> (se toma solo la parte de minutos).</div>
          <div class="text-danger small" th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}"></div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Precio (opcional)</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input class="form-control" type="number" min="0" step="0.01" th:field="*{price}" placeholder="0.00">
          </div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary">Guardar</button>
        <a class="btn btn-outline-dark" th:href="@{/services}">Volver</a>
      </div>
    </form>
  </div>
</div>

</html>
