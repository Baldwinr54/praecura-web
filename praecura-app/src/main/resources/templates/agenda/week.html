<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Agenda semanal', 'Agenda', 'Agenda clínica semanal')}">

<div th:fragment="content">
  <div class="page-actions">
    <div>
      <h3 class="m-0 section-title">Agenda semanal</h3>
      <div class="text-muted" th:text="|Semana del ${start} al ${end}|">Semana</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-sm btn-outline-secondary" th:href="@{/agenda(date=${start}, doctorId=${doctorId}, siteId=${siteId}, status=${status != null ? status.name() : null})}">Día</a>
      <a class="btn btn-sm btn-primary" th:href="@{/agenda/week(date=${base}, doctorId=${doctorId}, siteId=${siteId}, status=${status != null ? status.name() : null}, limit=${limit})}">Semana</a>
      <a class="btn btn-sm btn-outline-secondary" th:href="@{/agenda/export-range.csv(from=${start}, to=${end}, doctorId=${doctorId}, siteId=${siteId}, status=${status != null ? status.name() : null})}">CSV rango</a>
      <a class="btn btn-sm btn-outline-secondary" th:href="@{/agenda/export-range.ics(from=${start}, to=${end}, doctorId=${doctorId}, siteId=${siteId}, status=${status != null ? status.name() : null})}">ICS rango</a>
    </div>
  </div>

  <div class="card soft-card p-3 mb-3">
    <form class="row g-2 align-items-end" method="get" th:action="@{/agenda/week}">
      <div class="col-12 col-md-3">
        <label class="form-label">Semana (cualquier día)</label>
        <input class="form-control" type="date" name="date" th:value="${base}"/>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Médico</label>
        <select class="form-select" name="doctorId">
          <option value="">Todos</option>
          <option th:each="d : ${doctors}" th:value="${d.id}" th:selected="${doctorId != null and doctorId == d.id}" th:text="${d.fullName}">Doctor</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">Sede</label>
        <select class="form-select" name="siteId">
          <option value="">Todas</option>
          <option th:each="s : ${sites}" th:value="${s.id}" th:selected="${siteId != null and siteId == s.id}" th:text="${s.name}">Sede</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">Estado</label>
        <select class="form-select" name="status">
          <option value="">Todos</option>
          <option th:each="st : ${statuses}" th:value="${st.name()}" th:selected="${status != null and status == st}" th:text="${st.label()}">Status</option>
        </select>
      </div>
      <div class="col-12 col-md-2">
        <label class="form-label">Mostrar</label>
        <select class="form-select" name="limit">
          <option th:each="l : ${limitOptions}" th:value="${l}" th:selected="${l == limit}" th:text="${l + ' / día'}">25 / día</option>
        </select>
      </div>
      <div class="col-12 col-md-2">
        <button class="btn btn-primary w-100" type="submit">Aplicar</button>
      </div>
    </form>
  </div>

  <div class="row g-3">
    <div class="col-12 col-lg-6" th:each="d : ${days}">
      <div class="card soft-card p-3 h-100">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div class="fw-semibold">
            <span th:text="${#temporals.format(d, 'EEEE, dd/MM')}">Día</span>
            <span class="text-muted small" th:text="|(${dayCounts.get(d)} citas)|">(0 citas)</span>
          </div>
          <a class="btn btn-sm btn-outline-secondary" th:href="@{/agenda(date=${d},doctorId=${doctorId},siteId=${siteId},status=${status != null ? status.name() : null})}">Ver día</a>
        </div>

        <div th:if="${byDay.get(d) == null or #lists.isEmpty(byDay.get(d))}" class="text-muted">Sin citas</div>

        <div th:if="${byDay.get(d) != null and !#lists.isEmpty(byDay.get(d))}" class="list-group list-group-flush">
          <div class="list-group-item px-0" th:each="a : ${byDay.get(d)}">
            <div class="d-flex justify-content-between">
              <div>
                <div class="fw-semibold" th:text="|${#temporals.format(a.scheduledAt, 'HH:mm')} — ${a.patient != null ? a.patient.fullName : '—'}|">Hora</div>
                <div class="small text-muted">
                  <span th:text="${a.doctor.fullName}">Doctor</span>
                  <span th:if="${a.site != null}"> · </span>
                  <span th:if="${a.site != null}" th:text="${a.site.name}">Sede</span>
                  <span th:if="${a.resource != null}"> · </span>
                  <span th:if="${a.resource != null}" th:text="${a.resource.name}">Recurso</span>
                  <span> · </span>
                  <span th:if="${a.service != null and a.service.name != null and !#strings.isEmpty(a.service.name)}"
                        th:text="${a.service.name}">Servicio</span>
                  <span class="badge text-bg-danger ms-1" th:if="${a.service == null}">Falta servicio</span>
                  <span class="badge text-bg-warning ms-1" th:if="${a.patient != null and (a.patient.phone == null or #strings.isEmpty(a.patient.phone))}">Sin tel</span>
                  <span class="badge text-bg-warning ms-1" th:if="${a.patient != null and (a.patient.email == null or #strings.isEmpty(a.patient.email))}">Sin email</span>
                  <span class="badge text-bg-danger ms-1" th:if="${a.patient != null and !(a.patient.consentSms or a.patient.consentEmail or a.patient.consentWhatsapp)}">Sin consentimiento</span>
                  <span class="badge text-bg-info ms-1" th:if="${a.triageLevel != null}" th:text="${a.triageLevel.label()}">Prioridad</span>
                </div>
              </div>
              <span class="badge" th:classappend="| status-${a.status != null ? #strings.toLowerCase(a.status.name()) : 'programada'}|"
                    th:text="${a.status != null ? a.status.label() : '—'}">Estado</span>
            </div>
            <div class="d-flex justify-content-end gap-2 flex-wrap mt-2">
              <a class="btn btn-sm btn-outline-secondary" th:href="@{/appointments/{id}/edit(id=${a.id})}">Editar</a>
              <a class="btn btn-sm btn-outline-info" th:if="${a.patient != null}" th:href="@{/patients/{id}/edit(id=${a.patient.id})}">Actualizar contacto</a>

              <form th:if="${a.status != null and a.status.name() == 'PROGRAMADA'}"
                    th:action="@{/appointments/{id}/confirm(id=${a.id})}" method="post" style="display:inline"
                    data-confirm="¿Confirmar esta cita?">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-primary" type="submit">Confirmar</button>
              </form>

              <form th:if="${a.status != null and (a.status.name() == 'PROGRAMADA' or a.status.name() == 'CONFIRMADA')}"
                    th:action="@{/appointments/{id}/remind(id=${a.id})}" method="post" style="display:inline"
                    th:attr="data-confirm=${a.remindedAt == null ? '¿Enviar recordatorio de esta cita?' : '¿Reenviar recordatorio de esta cita?'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-success" type="submit"
                        th:disabled="${a.patient != null and ((#strings.isEmpty(a.patient.phone) and #strings.isEmpty(a.patient.email)) or !(a.patient.consentSms or a.patient.consentEmail or a.patient.consentWhatsapp))}"
                        th:text="${a.remindedAt == null ? 'Enviar recordatorio' : 'Reenviar recordatorio'}">Enviar recordatorio</button>
              </form>

              <form th:if="${a.status != null and (a.status.name() == 'PROGRAMADA' or a.status.name() == 'CONFIRMADA')}"
                    th:action="@{/appointments/{id}/complete(id=${a.id})}" method="post" style="display:inline"
                    data-confirm="¿Marcar como completada esta cita?">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-success" type="submit">Completar</button>
              </form>

              <form th:if="${a.status != null and (a.status.name() == 'PROGRAMADA' or a.status.name() == 'CONFIRMADA')}"
                    th:action="@{/appointments/{id}/no-show(id=${a.id})}" method="post" style="display:inline"
                    data-confirm="¿Marcar esta cita como no-show?">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-warning" type="submit">No-show</button>
              </form>

              <form th:if="${a.status != null and a.status.name() != 'CANCELADA'}"
                    th:action="@{/appointments/{id}/cancel(id=${a.id})}" method="post" style="display:inline"
                    data-confirm="¿Cancelar esta cita?">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-danger" type="submit">Cancelar</button>
              </form>
            </div>
          </div>
        </div>

        <div class="mt-2" th:if="${dayOverflow.get(d) != null and dayOverflow.get(d) > 0}">
          <a class="small" th:href="@{/agenda(date=${d},doctorId=${doctorId},siteId=${siteId},status=${status != null ? status.name() : null})}">
            Ver <span th:text="${dayOverflow.get(d)}">0</span> más…
          </a>
        </div>

      </div>
    </div>
  </div>

</div>
</html>
