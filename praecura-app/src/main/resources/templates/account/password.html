<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Cambiar contraseña', 'Cuenta', 'Seguridad')}">

<div th:fragment="content">
  <div class="card soft-card p-4">
    <div th:if="${force}" class="callout warning mb-3">
      Por seguridad, debes cambiar tu contraseña antes de continuar.
    </div>
    <div th:if="${error}" class="callout danger mb-3" th:text="${error}">Error</div>

    <form th:action="@{/account/password}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Contraseña actual</label>
          <input class="form-control" type="password" name="currentPassword" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nueva contraseña</label>
          <input class="form-control" type="password" name="newPassword" required>
          <div class="form-text" th:text="${policyHint}">Política</div>
        </div>
      </div>

      <div class="row g-3 mt-1">
        <div class="col-md-6">
          <label class="form-label">Confirmar nueva contraseña</label>
          <input class="form-control" type="password" name="confirmPassword" required>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary" type="submit">Actualizar</button>
        <a class="btn btn-outline-secondary" th:href="@{/}">Cancelar</a>
      </div>
    </form>
  </div>
</div>

</html>
