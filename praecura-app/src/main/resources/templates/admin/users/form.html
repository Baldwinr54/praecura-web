<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(~{::section}, (${isEdit} ? 'Editar usuario' : 'Nuevo usuario'), 'Usuarios', (${isEdit} ? 'Editar' : 'Crear'))}">

<section>
  <div class="card shadow-sm">
    <div class="card-body">
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form th:action="@{/admin/users/save}" method="post" class="row g-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <!-- Importante: sin este campo, al editar el formulario se procesa como si fuera un usuario nuevo -->
        <input type="hidden" name="id" th:value="${user.id}" />

        <div class="col-md-6">
          <label class="form-label">Usuario</label>
          <div th:if="${!isEdit}">
            <input name="username" class="form-control" placeholder="Ej: j.perez" th:value="${user.username}" required />
            <div class="form-text">No use espacios. Recomendado: minúsculas.</div>
          </div>
          <div th:if="${isEdit}">
            <input name="username" class="form-control" th:value="${user.username}" readonly />
            <div class="form-text">El usuario no se modifica.</div>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label" th:text="${isEdit} ? 'Nueva contraseña (opcional)' : 'Contraseña'">Contraseña</label>
          <input name="password" type="password" class="form-control" th:attr="required=${!isEdit}" placeholder="••••••••" />
          <div class="form-text" th:if="${isEdit}">Si la deja vacía, se mantiene la contraseña actual.</div>
          <div class="form-text" th:text="${policyHint}">Política</div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Rol</label>
          <select name="roleName" class="form-select" required>
            <option th:each="r : ${roles}"
                    th:value="${r.name}"
                    th:with="rk=${#strings.replace(r.name, 'ROLE_', '')}"
                    th:text="${rk == 'ADMIN' ? 'Administrador' : (rk == 'USER' ? 'Usuario' : rk)}"
                    th:selected="${user.role != null and user.role.name == r.name}"></option>
          </select>
        </div>

        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <!--
              Checkbox Spring MVC (field marker):
              - Si NO se marca, se envía solo _enabled y el binder asigna false
              - Si se marca, se envía enabled=true (además de _enabled) y el binder asigna true
            -->
            <input type="hidden" name="_enabled" value="on" />
            <input class="form-check-input" type="checkbox" name="enabled" value="true" th:checked="${user.enabled}">
            <label class="form-check-label">Activo</label>
          </div>
        </div>

        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Guardar</button>
          <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Cancelar</a>
        </div>
      </form>

    </div>
  </div>
</section>

</body>
</html>
