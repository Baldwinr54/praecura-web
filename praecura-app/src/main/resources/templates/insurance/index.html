<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'ARS y Seguros', 'Finanzas', 'Autorizaciones, coberturas, copagos y glosas')}">

<div th:fragment="content">
  <div class="row g-3">
    <div class="col-12 col-lg-6">
      <div class="card soft-card p-3 h-100">
        <h6 class="mb-2">Registrar ARS</h6>
        <form class="row g-2" th:action="@{/insurance/payers}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-4"><input class="form-control" name="code" placeholder="Código" required></div>
          <div class="col-md-8"><input class="form-control" name="name" placeholder="Nombre ARS" required></div>
          <div class="col-md-4"><input class="form-control" name="rnc" placeholder="RNC"></div>
          <div class="col-md-4"><input class="form-control" name="contactPhone" placeholder="Teléfono"></div>
          <div class="col-md-4"><input class="form-control" type="email" name="contactEmail" placeholder="Email"></div>
          <div class="col-12"><input class="form-control" name="notes" placeholder="Notas"></div>
          <div class="col-12"><button class="btn btn-primary" type="submit">Guardar ARS</button></div>
        </form>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card soft-card p-3 h-100">
        <h6 class="mb-2">Registrar plan ARS</h6>
        <form class="row g-2" th:action="@{/insurance/plans}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-5">
            <select class="form-select" name="payerId" required>
              <option value="">ARS</option>
              <option th:each="p : ${payers}" th:value="${p.id}" th:text="${p.name}">ARS</option>
            </select>
          </div>
          <div class="col-md-3"><input class="form-control" name="planCode" placeholder="Código" required></div>
          <div class="col-md-4"><input class="form-control" name="name" placeholder="Nombre plan" required></div>
          <div class="col-md-3"><input class="form-control" type="number" step="0.01" name="coveragePercent" placeholder="Cobertura %"></div>
          <div class="col-md-3"><input class="form-control" type="number" step="0.01" name="copayPercent" placeholder="Copago %"></div>
          <div class="col-md-3"><input class="form-control" type="number" step="0.01" name="deductibleAmount" placeholder="Deducible"></div>
          <div class="col-md-3">
            <select class="form-select" name="requiresAuthorization">
              <option value="false">Sin autorización</option>
              <option value="true">Requiere autorización</option>
            </select>
          </div>
          <div class="col-12"><button class="btn btn-outline-primary" type="submit">Guardar plan</button></div>
        </form>
      </div>
    </div>

    <div class="col-12">
      <div class="card soft-card p-3">
        <h6 class="mb-2">Asignar cobertura a paciente</h6>
        <form class="row g-2" th:action="@{/insurance/coverages}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-3">
            <select class="form-select" name="patientId" required>
              <option value="">Paciente</option>
              <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName}">Paciente</option>
            </select>
          </div>
          <div class="col-md-3">
            <select class="form-select" name="planId" required>
              <option value="">Plan</option>
              <option th:each="p : ${plans}" th:value="${p.id}" th:text="${p.payer.name + ' - ' + p.name}">Plan</option>
            </select>
          </div>
          <div class="col-md-2"><input class="form-control" name="policyNumber" placeholder="Póliza"></div>
          <div class="col-md-2"><input class="form-control" name="affiliateNumber" placeholder="Afiliado"></div>
          <div class="col-md-1"><input class="form-control" type="date" name="validFrom" title="Desde"></div>
          <div class="col-md-1"><input class="form-control" type="date" name="validTo" title="Hasta"></div>
          <div class="col-12"><button class="btn btn-outline-primary" type="submit">Asignar cobertura</button></div>
        </form>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card soft-card p-3 h-100">
        <h6 class="mb-2">Autorizaciones ARS</h6>
        <form class="row g-2" th:action="@{/insurance/authorizations}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-6">
            <select class="form-select" name="coverageId" required>
              <option value="">Cobertura</option>
              <option th:each="c : ${coverages}" th:value="${c.id}" th:text="${c.patient.fullName + ' - ' + c.plan.name}">Cobertura</option>
            </select>
          </div>
          <div class="col-md-6"><input class="form-control" name="authorizationNumber" placeholder="No. autorización"></div>
          <div class="col-md-4"><input class="form-control" type="number" step="0.01" name="requestedAmount" placeholder="Monto solicitado"></div>
          <div class="col-md-4"><input class="form-control" type="number" step="0.01" name="approvedAmount" placeholder="Monto aprobado"></div>
          <div class="col-md-4">
            <select class="form-select" name="status">
              <option th:each="s : ${authorizationStatuses}" th:value="${s}" th:text="${s.label()}">Estado</option>
            </select>
          </div>
          <div class="col-md-5"><input class="form-control" type="datetime-local" name="expiresAt"></div>
          <div class="col-md-7"><input class="form-control" name="notes" placeholder="Notas"></div>
          <div class="col-12"><button class="btn btn-outline-primary" type="submit">Registrar autorización</button></div>
        </form>

        <div class="table-responsive mt-3">
          <table class="table table-sm mb-0">
            <thead><tr><th>Paciente</th><th>No.</th><th>Estado</th><th>Monto</th></tr></thead>
            <tbody>
            <tr th:each="a : ${authorizations}">
              <td th:text="${a.coverage.patient.fullName}">Paciente</td>
              <td th:text="${a.authorizationNumber != null ? a.authorizationNumber : '—'}">—</td>
              <td><span class="badge text-bg-light" th:text="${a.status.label()}">Estado</span></td>
              <td th:text="${T(com.baldwin.praecura.util.UiFormatters).formatMoneyDOP(a.approvedAmount)}">RD$ 0.00</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card soft-card p-3 h-100">
        <h6 class="mb-2">Reclamos / Glosas ARS</h6>
        <form class="row g-2" th:action="@{/insurance/claims}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-4">
            <select class="form-select" name="invoiceId" required>
              <option value="">Factura</option>
              <option th:each="i : ${invoices}" th:value="${i.id}" th:text="${'#' + i.id + ' - ' + i.patient.fullName}">Factura</option>
            </select>
          </div>
          <div class="col-md-4">
            <select class="form-select" name="coverageId">
              <option value="">Cobertura</option>
              <option th:each="c : ${coverages}" th:value="${c.id}" th:text="${c.plan.name}">Cobertura</option>
            </select>
          </div>
          <div class="col-md-4">
            <select class="form-select" name="authorizationId">
              <option value="">Autorización</option>
              <option th:each="a : ${authorizations}" th:value="${a.id}" th:text="${a.authorizationNumber != null ? a.authorizationNumber : ('AUTH-' + a.id)}">AUTH</option>
            </select>
          </div>
          <div class="col-md-4">
            <select class="form-select" name="status">
              <option th:each="s : ${claimStatuses}" th:value="${s}" th:text="${s.label()}">Estado</option>
            </select>
          </div>
          <div class="col-md-4"><input class="form-control" type="number" step="0.01" name="claimedAmount" placeholder="Reclamado"></div>
          <div class="col-md-4"><input class="form-control" type="number" step="0.01" name="approvedAmount" placeholder="Aprobado"></div>
          <div class="col-md-4"><input class="form-control" type="number" step="0.01" name="deniedAmount" placeholder="Glosa"></div>
          <div class="col-md-8"><input class="form-control" name="denialReason" placeholder="Motivo de glosa/rechazo"></div>
          <div class="col-12"><input class="form-control" name="notes" placeholder="Notas"></div>
          <div class="col-12"><button class="btn btn-outline-primary" type="submit">Guardar reclamo</button></div>
        </form>

        <div class="table-responsive mt-3">
          <table class="table table-sm mb-0">
            <thead><tr><th>Factura</th><th>Estado</th><th>Reclamado</th><th>Aprobado</th><th>Glosa</th></tr></thead>
            <tbody>
            <tr th:each="c : ${claims}">
              <td th:text="${'#' + c.invoice.id}">#0</td>
              <td><span class="badge text-bg-light" th:text="${c.status.label()}">Estado</span></td>
              <td th:text="${T(com.baldwin.praecura.util.UiFormatters).formatMoneyDOP(c.claimedAmount)}">RD$ 0.00</td>
              <td th:text="${T(com.baldwin.praecura.util.UiFormatters).formatMoneyDOP(c.approvedAmount)}">RD$ 0.00</td>
              <td th:text="${T(com.baldwin.praecura.util.UiFormatters).formatMoneyDOP(c.deniedAmount)}">RD$ 0.00</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

</html>
