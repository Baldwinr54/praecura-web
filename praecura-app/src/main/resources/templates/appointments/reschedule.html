<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content}, 'Reprogramar cita', 'Citas', 'Reagenda clínica')}">

<div th:fragment="content">
  <div class="card soft-card p-4">

    <div class="mb-3">
      <div class="small text-muted">Cita</div>
      <div class="fw-semibold" th:text="${appointment.patient.fullName} + ' • ' + ${appointment.doctor.fullName}">Paciente • Médico</div>
      <div class="text-muted" th:text="${#temporals.format(appointment.scheduledAt, 'dd/MM/yyyy HH:mm')}">Fecha</div>
    </div>

    <form th:object="${form}" th:action="@{|/appointments/${form.id}/reschedule|}" method="post"
          data-reschedule-form
          th:attr="data-appointment-id=${form.id}, data-duration=${appointment.durationMinutes}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{id}"/>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Médico</label>
          <select class="form-select" th:field="*{doctorId}">
            <option value="">-- Seleccione --</option>
            <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}"></option>
          </select>
          <div class="text-danger small" th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}"></div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Nueva fecha y hora</label>
          <input class="form-control" type="datetime-local" th:field="*{scheduledAt}" data-min-now="true" step="60"/>
          <div class="text-danger small" th:if="${#fields.hasErrors('scheduledAt')}" th:errors="*{scheduledAt}"></div>
        </div>
      </div>

      <div id="availabilityBox" class="availability-box callout warning mb-3" hidden>
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div>
            <div class="fw-semibold">Disponibilidad</div>
            <div id="availabilityMessage" class="small">Validando…</div>
          </div>
          <button id="applySuggestion" class="btn btn-sm btn-outline-primary" type="button" hidden>
            Usar sugerencia: <span id="suggestedAtLabel"></span>
          </button>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit"><i class="bi bi-calendar2-check"></i> Guardar</button>
        <a class="btn btn-outline-secondary" th:href="@{/appointments}"><i class="bi bi-arrow-left"></i> Volver</a>
      </div>
    </form>

  </div>
  <script th:src="@{/js/appointments-reschedule.js}" defer></script>
</div>
</html>
