<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{fragments/layout :: layout(~{::content}, 'Sedes', 'Sedes', 'Sedes clínicas')}">
  <div th:fragment="content">

    <div class="page-actions">
      <form class="search-row" th:action="@{/sites}" method="get" role="search">
        <input class="form-control search-input" type="text" name="q" placeholder="Buscar (nombre o código...)" th:value="${q}">
        <input type="hidden" name="size" th:value="${size}">
        <button class="btn btn-outline-secondary" type="submit">Buscar</button>
        <a class="btn btn-ghost" th:href="@{/sites}">Limpiar</a>
      </form>

      <a class="btn btn-primary" th:href="@{/sites/new}">Nueva sede</a>
    </div>

    <div th:if="${sitesPage.totalElements == 0}" class="empty-state">
      <div class="empty-state__box">
        <div class="empty-state__title">No hay sedes registradas</div>
        <div class="empty-state__text">Crea sedes para distribuir agenda y recursos.</div>
        <a class="btn btn-primary" th:href="@{/sites/new}">Crear primera sede</a>
      </div>
    </div>

    <div th:if="${sitesPage.totalElements > 0}" class="card soft-card p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
          <tr>
            <th style="width:80px">ID</th>
            <th>Nombre</th>
            <th style="width:140px">Código</th>
            <th>Dirección</th>
            <th style="width:160px">Teléfono</th>
            <th style="width:220px" class="text-end">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="s : ${sitesPage.content}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.code != null ? s.code : '—'}"></td>
            <td th:text="${s.address != null ? s.address : '—'}"></td>
            <td th:text="${s.phone != null ? s.phone : '—'}"></td>
            <td>
              <div class="d-flex justify-content-end gap-2 flex-wrap">
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/sites/{id}/edit(id=${s.id})}">Editar</a>
                <form th:action="@{/sites/{id}/deactivate(id=${s.id})}" method="post" style="display:inline" data-confirm="¿Desactivar esta sede?">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="q" th:value="${q}">
                  <input type="hidden" name="page" th:value="${sitesPage.number}">
                  <input type="hidden" name="size" th:value="${size}">
                  <button class="btn btn-sm btn-danger" type="submit">Desactivar</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="text-muted small">Mostrando <span th:text="${sitesPage.numberOfElements}"></span> de <span th:text="${sitesPage.totalElements}"></span></div>
        <nav th:if="${sitesPage.totalPages > 1}">
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${sitesPage.first} ? 'disabled' : ''">
              <a class="page-link" th:href="@{/sites(q=${q}, page=${sitesPage.number-1}, size=${size})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, sitesPage.totalPages-1)}" th:classappend="${i == sitesPage.number} ? 'active' : ''">
              <a class="page-link" th:href="@{/sites(q=${q}, page=${i}, size=${size})}" th:text="${i+1}">1</a>
            </li>
            <li class="page-item" th:classappend="${sitesPage.last} ? 'disabled' : ''">
              <a class="page-link" th:href="@{/sites(q=${q}, page=${sitesPage.number+1}, size=${size})}">Siguiente</a>
            </li>
          </ul>
        </nav>
      </div>

    </div>

  </div>
</div>
</body>
</html>
